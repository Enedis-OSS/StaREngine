# ORT configuration for the Star Engine project.
# See https://github.com/oss-review-toolkit/ort/blob/main/docs/config-file-ort-yml.md

resolutions:
  issues:
    - message: "Cython.Build.cythonize not found"
      reason: "CANT_FIX_ISSUE"
      comment: >
        pyproj requires Cython at build time to evaluate its setup.py.
        Cython is not available in the ORT container.
        pyproj 3.7.2 is licensed under MIT.
